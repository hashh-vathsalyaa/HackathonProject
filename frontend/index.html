<!DOCTYPE html>
<html>
<head>
  <title>🌱 FarmLink - Fresh Direct</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #4CAF50, #8BC34A, #C0E6A5);
      min-height: 100vh;
      padding: 20px;
    }
    #dashboard, .category-dashboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 30px auto;
      max-width: 800px;
    }
    .card {
      width: 160px;
      height: 160px;
      border: 3px solid #2E7D32;
      background: linear-gradient(145deg, #fff, #E8F5E8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .card.veg { border-color: #388E3C; }
    .card.fruit { border-color: #FBC02D; }
    .card.flower { border-color: #E91E63; }
    .hidden { display: none; }
    .login-section, .add-section {
      max-width: 400px;
      margin: 30px auto;
      padding: 30px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #AED581;
      border-radius: 10px;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.3); }
    input:invalid { border-color: #FF5722; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(145deg, #4CAF50, #45a049);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin: 5px 0;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    button.back { width: auto; background: #757575; margin-right: auto; }
    #welcome { text-align: center; color: #2E7D32; font-size: 18px; margin: 15px 0; padding: 15px; background: #E8F5E8; border-radius: 10px; }
    .product { background: white; border: 2px solid #AED581; border-radius: 15px; padding: 20px; margin: 15px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .product:hover { transform: translateY(-3px); }
    .category-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 10px; }
    .veg-badge { background: #E8F5E8; color: #2E7D32; }
    .fruit-badge { background: #FFF3E0; color: #F57C00; }
    .flower-badge { background: #FCE4EC; color: #C2185B; }
    h2, h3 { color: #2E7D32; }
    @media (max-width: 600px) {
      .category-dashboard { flex-direction: column; align-items: center; }
      .card { width: 250px; }
    }
  </style>
</head>
<body>
  <!-- Main Dashboard -->
  <div id="dashboard">
    <div class="card farmer" onclick="showFarmerLogin()">
      👨‍🌾 Farmer<br><small>🌾 Fresh Farm</small>
    </div>
    <div class="card consumer" onclick="showConsumerLogin()">
      👤 Consumer<br><small>🛒 Buy Now</small>
    </div>
  </div>

  <!-- Farmer Login -->
  <div id="farmerLogin" class="hidden login-section">
    <button class="back" onclick="goBackFromLogin()">⬅ Back</button>
    <h2>🌾 Farmer Login</h2>
    <input id="farmerName" placeholder="Farmer Name" required>
    <input id="farmerPhone" type="tel" pattern="[0-9]{10}" placeholder="Mobile (10 digits)" maxlength="10" required>
    <button onclick="proceedFarmer()">🌱 Enter Farm</button>
  </div>

  <!-- Consumer Login -->
  <div id="consumerLogin" class="hidden login-section">
    <button class="back" onclick="goBackFromLogin()">⬅ Back</button>
    <h2>🛒 Consumer Login</h2>
    <input id="consumerName" placeholder="Your Name" required>
    <input id="consumerPhone" type="tel" pattern="[0-9]{10}" placeholder="Mobile (10 digits)" maxlength="10" required>
    <input id="consumerLocation" placeholder="City or lat,long" required>
    <button type="button" onclick="detectLocation()">📍 Auto Detect GPS</button>
    <button onclick="proceedConsumer()">🚀 Enter Market</button>
  </div>

  <!-- Farmer Category Dashboard -->
  <div id="farmerCategories" class="hidden">
    <button class="back" onclick="goBack()" style="margin: 20px auto; display: block;">🏠 Home</button>
    <h2 style="text-align: center;">👨‍🌾 Farmer Dashboard</h2>
    <div id="farmerWelcomeDash"></div>
    <div class="category-dashboard">
      <div class="card veg" onclick="showAdd('veg')">
        🥬<br>Vegetables
      </div>
      <div class="card fruit" onclick="showAdd('fruit')">
        🍎<br>Fruits
      </div>
      <div class="card flower" onclick="showAdd('flower')">
        🌸<br>Flowers
      </div>
    </div>
  </div>

  <!-- Add Product Section -->
  <div id="addSection" class="hidden add-section">
    <button class="back" onclick="showFarmerCategories()">⬅ Categories</button>
    <h2 id="addTitle"></h2>
    <div id="addWelcome"></div>
    <input id="name" placeholder="Product Name" required>
    <input id="price" type="number" step="0.01" placeholder="Price ₹/kg" required>
    <input id="quantity" type="number" placeholder="Available kg" required>
    <input id="minQty" type="number" placeholder="Min Bulk kg" required>
    <button onclick="addProduct()">+ List Product</button>
  </div>

  <!-- Consumer Dashboard -->
  <div id="consumer" class="hidden" style="max-width: 700px; margin: 20px auto;">
    <button class="back" onclick="goBack()" style="margin: 20px auto; display: block;">🏠 Home</button>
    <h2>🛒 Fresh Market</h2>
    <div id="consumerWelcomeDash"></div>
    <div id="productList"></div>
  </div>

  <script>
    let currentUser = null;
    let currentCategory = '';

    function showFarmerLogin() {
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("farmerLogin").classList.remove("hidden");
    }

    function showConsumerLogin() {
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("consumerLogin").classList.remove("hidden");
    }

    function goBackFromLogin() {
      document.getElementById("dashboard").classList.remove("hidden");
      document.getElementById("farmerLogin").classList.add("hidden");
      document.getElementById("consumerLogin").classList.add("hidden");
    }

    function proceedFarmer() {
      const name = document.getElementById('farmerName').value.trim();
      const phone = document.getElementById('farmerPhone').value.trim();
      if (!name || !/^\d{10}$/.test(phone)) return alert('Name & 10-digit phone required.');
      localStorage.setItem('farmerProfile', JSON.stringify({name, phone}));
      currentUser = {type: 'farmer', name, phone};
      document.getElementById('farmerWelcomeDash').innerHTML = `👨‍🌾 ${name} | 📞 ${phone.slice(0,3)}***${phone.slice(-3)}`;
      setTimeout(() => {
        document.getElementById("farmerLogin").classList.add("hidden");
        document.getElementById("farmerCategories").classList.remove("hidden");
      }, 500);
    }

    function detectLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          document.getElementById('consumerLocation').value = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        }, () => alert('GPS denied. Enter city manually.'));
      }
    }

    function proceedConsumer() {
      const name = document.getElementById('consumerName').value.trim();
      const phone = document.getElementById('consumerPhone').value.trim();
      const location = document.getElementById('consumerLocation').value.trim();
      if (!name || !/^\d{10}$/.test(phone) || !location) return alert('All fields & 10-digit phone required.');
      localStorage.setItem('consumerProfile', JSON.stringify({name, phone, location}));
      currentUser = {type: 'consumer', name, phone, location};
      document.getElementById('consumerWelcomeDash').innerHTML = `👤 ${name} 📍 ${location}`;
      setTimeout(() => {
        document.getElementById("consumerLogin").classList.add("hidden");
        document.getElementById("consumer").classList.remove("hidden");
        displayAllProducts();
      }, 500);
    }

    function showFarmerCategories() {
      document.getElementById("addSection").classList.add("hidden");
      document.getElementById("farmerCategories").classList.remove("hidden");
    }

    function showAdd(cat) {
      currentCategory = cat;
      const titles = {veg: '🥬 Vegetables', fruit: '🍎 Fruits', flower: '🌸 Flowers'};
      const emojis = {veg: '🥬', fruit: '🍎', flower: '🌸'};
      document.getElementById("addTitle").innerHTML = `${emojis[cat]} Add ${titles[cat][0].slice(2)}`;
      document.getElementById("addWelcome").innerHTML = `📋 List your fresh ${cat} for consumers`;
      document.getElementById("farmerCategories").classList.add("hidden");
      document.getElementById("addSection").classList.remove("hidden");
    }

    function goBack() {
      document.getElementById("farmerCategories").classList.add("hidden");
      document.getElementById("consumer").classList.add("hidden");
      document.getElementById("addSection").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    }

    function addProduct() {
      const name = document.getElementById('name').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const quantity = parseInt(document.getElementById('quantity').value);
      const minQty = parseInt(document.getElementById('minQty').value);
      
      if (!name || isNaN(price) || isNaN(quantity) || isNaN(minQty) || minQty > quantity) {
        return alert('Valid details: MinQty ≤ Quantity');
      }
      
      let products = JSON.parse(localStorage.getItem(currentCategory)) || [];
      products.push({name, price, quantity, minQty});
      localStorage.setItem(currentCategory, JSON.stringify(products));
      
      // Clear form
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('quantity').value = '';
      document.getElementById('minQty').value = '';
      
      alert(`✅ ${name} listed in ${currentCategory}!`);
      showFarmerCategories();
    }

    function displayAllProducts() {
      const cats = ['veg', 'fruit', 'flower'];
      const productList = document.getElementById('productList');
      productList.innerHTML = '';
      
      cats.forEach(cat => {
        let products = JSON.parse(localStorage.getItem(cat)) || [];
        products.forEach(product => {
          const div = document.createElement('div');
          div.className = 'product';
          const badgeClass = cat === 'veg' ? 'veg-badge' : cat === 'fruit' ? 'fruit-badge' : 'flower-badge';
          div.innerHTML = `
            <h3>${getEmoji(product.name, cat)} ${product.name} <span class="category-badge ${badgeClass}">${cat.toUpperCase()}</span></h3>
            <p><strong>₹${product.price}/kg</strong></p>
            <p>📦 Stock: ${product.quantity} kg | Min: ${product.minQty} kg</p>
          `;
          productList.appendChild(div);
        });
      });
      
      if (productList.children.length === 0) {
        productList.innerHTML = '<div class="product" style="text-align:center;"><p>🥬 No products yet. Farmers add some!</p></div>';
      }
    }

    function getEmoji(name, cat) {
      const emojis = {
        veg: {tomato: '🍅', carrot: '🥕', potato: '🥔', onion: '🧅', cabbage: '🥬'},
        fruit: {apple: '🍎', banana: '🍌', mango: '🥭', orange: '🍊'},
        flower: {rose: '🌹', lily: '🌺', sunflower: '🌻'}
      };
      name = name.toLowerCase();
      for (let key in emojis[cat]) {
        if (name.includes(key)) return emojis[cat][key];
      }
      return cat === 'veg' ? '🥬' : cat === 'fruit' ? '🍎' : '🌸';
    }
  </script>
</body>
</html>
